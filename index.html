<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Jaume & Irina — Barcelona 2026</title>
<link rel="preload" as="image" href="palau.jpg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap');

  @font-face {
    font-family: 'Quivert';
    src: url('Quivert.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --gold: #C4993B;
    --gold-light: #D4AF5C;
    --gold-pale: #E8D5A3;
    --terracotta: #B85C38;
    --terracotta-deep: #8B3A2A;
    --cream: #FAF3E8;
    --warm-white: #FDF8F0;
    --sage: #7A8B6F;
    --deep-green: #3D5A3E;
    --charcoal: #2C2C2C;
    --soft-brown: #6B5344;
    --blush: #E8D5C4;
    --mosaic-blue: #4A7B8C;
    --mosaic-teal: #3A7D6E;
    --deep-teal: #1B5E5A;
    --burgundy: #6B1D3A;
    --stained-rose: #C45C72;
    --mosaic-amber: #D4943A;
    --mosaic-cobalt: #2E5090;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === Palau background — always present, layer 1 === */
  .palau-bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('palau.jpg') center center / cover no-repeat;
  }

  /* === Solid cream layer — layer 1.5, covers gaps between tessellation pieces === */
  .cream-seal {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: var(--cream);
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  body.ee-active .cream-seal {
    opacity: 0;
  }

  /* === Tessellation layer — layer 2, covers palau === */
  .tess-layer {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .tess-piece {
    position: fixed;
    background: var(--cream);
    will-change: transform, opacity;
    pointer-events: none;
  }

  /* === Trencadís mosaic background pattern === */
  .bg-trencadis {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    opacity: 0.035;
  }
  .bg-trencadis svg { width: 100%; height: 100%; }

  /* === Ornamental Border Frame === */
  .page-frame {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    z-index: 4;
    transition: opacity 1s ease;
  }

  .page-frame::before,
  .page-frame::after {
    display: none;
  }

  /* === SVG Ornaments === */
  .ornament {
    display: block;
    margin: 0 auto;
    max-width: 340px;
    height: auto;
  }

  .ornament-top { margin-bottom: 0.5rem; }
  .ornament-bottom { margin-top: 1rem; }

  /* === Corner ornaments === */
  .corner-ornament {
    position: fixed;
    width: 120px;
    height: 120px;
    opacity: 0.15;
    z-index: 5;
    pointer-events: none;
  }
  .corner-ornament svg { width: 100%; height: 100%; }
  .corner-tl { top: 16px; left: 16px; }
  .corner-tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner-br { bottom: 16px; right: 16px; transform: scale(-1, -1); }

  /* === Main Content === */
  .content {
    text-align: center;
    max-width: 640px;
    animation: fadeIn 2.5s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .save-the-date {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .names {
    font-family: 'Quivert', 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 5.2rem);
    font-weight: 400;
    line-height: 1.15;
    color: #2E6B4A;
    margin-bottom: 0.3rem;
  }

  .names .amp {
    font-style: italic;
    font-size: 0.55em;
    color: var(--gold);
    display: block;
    margin: 0.1em 0;
    font-family: 'Quivert', 'Playfair Display', serif;
  }

  /* === Trencadís divider === */
  .trencadis-divider {
    display: block;
    margin: 1rem auto;
    max-width: 320px;
    height: auto;
  }

  .event-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--soft-brown);
    margin-bottom: 0.5rem;
  }

  .event-detail {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    font-weight: 300;
    font-style: italic;
    color: var(--sage);
    letter-spacing: 0.08em;
  }

  .location {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.8vw, 0.78rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-top: 1.5rem;
    opacity: 0.85;
  }

  /* === Countdown === */
  .countdown {
    display: flex;
    justify-content: center;
    gap: clamp(1.2rem, 4vw, 2.5rem);
    margin-top: 1.5rem;
  }

  .countdown-unit { text-align: center; }

  .countdown-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 400;
    color: var(--charcoal);
    line-height: 1;
  }

  .countdown-label {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 0.35rem;
  }

  /* === Add to Calendar button === */
  .calendar-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding: 0.65rem 1.8rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--gold-light);
    border-radius: 2px;
    text-decoration: none;
    transition: all 0.4s ease;
    cursor: pointer;
  }

  .calendar-btn:hover {
    background: var(--gold);
    color: var(--cream);
    border-color: var(--gold);
  }

  .calendar-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  /* === Mosaic accent bar === */
  .mosaic-accent {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    z-index: 11;
    overflow: hidden;
  }
  .mosaic-accent svg { width: 100%; height: 100%; }

  /* === Side ornamental rails === */
  .side-rail {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 60vh;
    z-index: 5;
    pointer-events: none;
    opacity: 0.08;
  }
  .side-rail svg { width: 100%; height: 100%; }
  .side-rail-left { left: 18px; }
  .side-rail-right { right: 18px; transform: translateY(-50%) scaleX(-1); }

  /* === Stained glass rose window === */
  .rose-window {
    display: block;
    margin: 0 auto 1.5rem;
    width: 80px;
    height: 80px;
    opacity: 0.25;
    animation: roseGlow 6s ease-in-out infinite alternate;
  }

  @keyframes roseGlow {
    from { opacity: 0.2; }
    to { opacity: 0.35; }
  }

  .footer-note {
    font-size: 0.8rem;
    font-style: italic;
    color: var(--sage);
    margin-top: 2rem;
    opacity: 0.6;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.4s ease, letter-spacing 0.4s ease;
  }
  .footer-note:hover {
    opacity: 0.85;
    letter-spacing: 0.1em;
  }

  /* === Easter egg active — ornaments fly away === */
  body.ee-active .corner-ornament,
  body.ee-active .side-rail {
    transition: transform 2s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 1.5s ease;
  }
  body.ee-active .corner-tl { transform: translate(-200px, -200px) rotate(-45deg); opacity: 0; }
  body.ee-active .corner-tr { transform: scaleX(-1) translate(-200px, -200px) rotate(-45deg); opacity: 0; }
  body.ee-active .corner-bl { transform: scaleY(-1) translate(-200px, -200px) rotate(45deg); opacity: 0; }
  body.ee-active .corner-br { transform: scale(-1,-1) translate(-200px, -200px) rotate(45deg); opacity: 0; }
  body.ee-active .side-rail-left { transform: translateY(-50%) translateX(-100px); opacity: 0; }
  body.ee-active .side-rail-right { transform: translateY(-50%) scaleX(-1) translateX(-100px); opacity: 0; }
  body.ee-active .mosaic-accent { transition: transform 0.8s ease, opacity 0.6s ease; transform: translateY(20px); opacity: 0; }
  body.ee-active .bg-trencadis { transition: opacity 0.6s ease; opacity: 0 !important; }
  body.ee-active .page-frame { opacity: 0; pointer-events: none; transition: opacity 0.8s ease; }

  /* Reverse — instant snap back */
  body:not(.ee-active) .corner-ornament,
  body:not(.ee-active) .side-rail,
  body:not(.ee-active) .mosaic-accent,
  body:not(.ee-active) .bg-trencadis {
    transition: none;
  }
  body:not(.ee-active) .page-frame {
    transition: none;
    transform: none;
  }

  /* === Arched window frame === */
  .arch-frame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(500px, 85vw);
    height: min(700px, 85vh);
    pointer-events: none;
    z-index: -1;
    opacity: 0.06;
  }
  .arch-frame svg { width: 100%; height: 100%; }

  /* === Language Toggle === */
  .lang-toggle {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 20;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid var(--gold-pale);
    border-radius: 3px;
    padding: 0.4em 0.6em;
    background: rgba(250, 243, 232, 0.85);
  }
  .lang-toggle a {
    color: var(--soft-brown);
    text-decoration: none;
    cursor: pointer;
    padding: 0.15em 0.3em;
    transition: color 0.3s ease, opacity 0.3s ease;
    opacity: 0.5;
  }
  .lang-toggle a:hover { opacity: 1; color: var(--gold); }
  .lang-toggle a.active {
    color: var(--soft-brown);
    opacity: 1;
    font-weight: 600;
  }
  .lang-toggle .sep {
    color: var(--soft-brown);
    opacity: 0.35;
    margin: 0 0.15em;
    font-weight: 300;
  }

  @media (max-width: 480px) {
    .page-frame { padding: 1.5rem 1rem; }
    .corner-ornament { width: 50px; height: 50px; }
    .side-rail { display: none; }
    .arch-frame { opacity: 0.04; }
    .ornament-top { max-width: 240px; margin-bottom: 0.3rem; }
    .ornament-bottom { margin-top: 0.5rem; }
    .save-the-date { margin-bottom: 0.5rem; }
    .names { font-size: clamp(2.2rem, 10vw, 3.5rem); }
    .trencadis-divider { margin: 0.5rem auto; }
    .location { margin-top: 1rem; }
    .countdown { margin-top: 1rem; }
    .calendar-btn { margin-top: 1rem; }
    .footer-note { margin-top: 1rem; }
  }

  @media (max-height: 700px) {
    .page-frame { padding: 1rem 1rem; }
    .ornament-top { max-width: 200px; margin-bottom: 0.2rem; }
    .ornament-bottom { margin-top: 0.5rem; }
    .save-the-date { margin-bottom: 0.3rem; font-size: 0.6rem; }
    .names { font-size: clamp(1.8rem, 7vw, 2.8rem); line-height: 1.1; }
    .names .amp { margin: 0; }
    .trencadis-divider { margin: 0.3rem auto; }
    .event-date { font-size: 1rem; }
    .countdown { margin-top: 0.8rem; }
    .calendar-btn { margin-top: 0.8rem; padding: 0.5rem 1.2rem; }
    .footer-note { margin-top: 0.8rem; }
  }
</style>
</head>

<script>
(function() {
  // === i18n ===
  var T = {
    ca: { saveTheDate:'Reserva la Data', dateLine:'Divendres, vint-i-cinc de setembre', yearLine:'de dos mil vint-i-sis', celebration:'Celebració a les Set del Vespre', location:'Cotton House · Barcelona', days:'Dies', hours:'Hores', min:'Min', calendar:'Afegeix al teu Calendari', footer:'Més detalls properament' },
    es: { saveTheDate:'Reserva la Fecha', dateLine:'Viernes, veinticinco de septiembre', yearLine:'de dos mil veintiséis', celebration:'Celebración a las Siete de la Tarde', location:'Cotton House · Barcelona', days:'Días', hours:'Horas', min:'Min', calendar:'Añade a tu Calendario', footer:'Más detalles próximamente' },
    en: { saveTheDate:'Save the Date', dateLine:'Friday, the Twenty-Fifth of September', yearLine:'Two Thousand and Twenty-Six', celebration:"Evening Celebration at Seven o'Clock", location:'Cotton House · Barcelona', days:'Days', hours:'Hours', min:'Min', calendar:'Add to Your Calendar', footer:'More details to follow' }
  };
  function setLang(lang) {
    if (!T[lang]) lang = 'ca';
    var strings = T[lang];
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (strings[key]) el.textContent = strings[key];
    });
    document.documentElement.lang = lang;
    document.querySelectorAll('#lang-toggle a[data-lang]').forEach(function(a) {
      a.classList.toggle('active', a.getAttribute('data-lang') === lang);
    });
    var url = new URL(window.location);
    url.searchParams.set('lang', lang);
    history.replaceState(null, '', url);
  }
  var initLang = new URLSearchParams(window.location.search).get('lang') || 'ca';
  setLang(initLang);
  document.getElementById('lang-toggle').addEventListener('click', function(e) {
    var lang = e.target.getAttribute('data-lang');
    if (lang) setLang(lang);
  });

  // === Easter eggs ===
  console.log('%c💒 Jaume & Irina — 26.09.2026', 'font-size:20px;font-family:serif;color:#C4993B;');
  console.log('%cBuilt with love (and way too many git commits) by Manolo 🥸', 'font-size:12px;color:#6B5344;');
  console.log('%cPsst... email Manolo the assistant at his email for a special surprise at the wedding 🎁', 'font-size:11px;color:#7A8B6F;font-style:italic;');

  // === Random name order ===
  if (Math.random() < 0.5) {
    document.getElementById('name1').textContent = 'Irina';
    document.getElementById('name2').textContent = 'Jaume';
    document.title = 'Irina & Jaume — Barcelona 2026';
  }

  // === Countdown ===
  const weddingDate = new Date('2026-09-25T19:00:00+02:00');
  function update() {
    const now = new Date();
    const diff = weddingDate - now;
    if (diff <= 0) {
      document.getElementById('countdown').style.display = 'none';
      return;
    }
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const min = Math.floor((diff % 3600000) / 60000);
    document.getElementById('cd-days').textContent = days;
    document.getElementById('cd-hours').textContent = hours;
    document.getElementById('cd-min').textContent = min;
  }
  update();
  setInterval(update, 30000);

  // === Layered Reveal Easter Egg ===
  var tessLayer = document.getElementById('tess-layer');
  var pageFrame = document.getElementById('page-frame');
  var footer = document.querySelector('.footer-note');
  var active = false;
  var pieces = [];

  function createTessellation() {
    var w = window.innerWidth, h = window.innerHeight;
    var cols = 12;
    var cellW = w / cols;
    var rows = Math.ceil(h / cellW) + 1;
    var cellH = h / rows;

    // Generate jittered grid vertices
    var grid = [];
    for (var r = 0; r <= rows; r++) {
      grid[r] = [];
      for (var c = 0; c <= cols; c++) {
        var bx = c * cellW, by = r * cellH;
        var jx = 0, jy = 0;
        if (c > 0 && c < cols) jx = (Math.random() - 0.5) * cellW * 0.55;
        if (r > 0 && r < rows) jy = (Math.random() - 0.5) * cellH * 0.55;
        grid[r][c] = {
          x: Math.min(Math.max(bx + jx, -2), w + 2),
          y: Math.min(Math.max(by + jy, -2), h + 2)
        };
      }
    }

    // Create two triangles per cell
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var tl = grid[r][c], tr = grid[r][c+1];
        var bl = grid[r+1][c], br = grid[r+1][c+1];

        var triangles = Math.random() < 0.5
          ? [[tl,tr,bl],[tr,br,bl]]
          : [[tl,tr,br],[tl,br,bl]];

        for (var t = 0; t < 2; t++) {
          var tri = triangles[t];
          var el = document.createElement('div');
          el.className = 'tess-piece';

          var minX = Math.min(tri[0].x, tri[1].x, tri[2].x);
          var minY = Math.min(tri[0].y, tri[1].y, tri[2].y);
          var maxX = Math.max(tri[0].x, tri[1].x, tri[2].x);
          var maxY = Math.max(tri[0].y, tri[1].y, tri[2].y);

          el.style.left = minX + 'px';
          el.style.top = minY + 'px';
          el.style.width = (maxX - minX) + 'px';
          el.style.height = (maxY - minY) + 'px';

          var p0 = (tri[0].x - minX) + 'px ' + (tri[0].y - minY) + 'px';
          var p1 = (tri[1].x - minX) + 'px ' + (tri[1].y - minY) + 'px';
          var p2 = (tri[2].x - minX) + 'px ' + (tri[2].y - minY) + 'px';
          el.style.clipPath = 'polygon(' + p0 + ', ' + p1 + ', ' + p2 + ')';

          // Centroid Y for bottom-to-top wave timing
          var cy = (tri[0].y + tri[1].y + tri[2].y) / 3;
          el._normalY = cy / h;

          // Pre-compute scatter direction
          el._tx = (Math.random() - 0.5) * 400;
          el._ty = 200 + Math.random() * 400;
          el._rot = (Math.random() - 0.5) * 180;

          tessLayer.appendChild(el);
          pieces.push(el);
        }
      }
    }
  }

  // Create tessellation on page load
  createTessellation();

  function activate() {
    if (active) return;
    active = true;

    // Add class for ornament fly-away
    document.body.classList.add('ee-active');

    // Animate tessellation pieces: bottom-to-top wave
    pieces.forEach(function(el) {
      var baseDelay = 200 + (1 - el._normalY) * 800; // fast bottom-to-top propagation
      var jitter = (Math.random() - 0.5) * 150;
      var delay = Math.max(0, baseDelay + jitter);
      el.style.transition = 'transform 2.5s cubic-bezier(0.25,0.8,0.25,1) ' + delay + 'ms, opacity 2s ease ' + (delay + 300) + 'ms';
      requestAnimationFrame(function() {
        el.style.transform = 'translate(' + el._tx + 'px,' + el._ty + 'px) rotate(' + el._rot + 'deg)';
        el.style.opacity = '0';
      });
    });
  }

  function deactivate() {
    if (!active) return;
    active = false;

    // Kill transitions on cream seal for instant snap
    var seal = document.querySelector('.cream-seal');
    if (seal) { seal.style.transition = 'none'; }

    document.body.classList.remove('ee-active');

    // Restore cream seal transition after snap
    requestAnimationFrame(function() {
      if (seal) seal.style.transition = '';
    });

    // Instant snap back — no animation
    pieces.forEach(function(el) {
      el.style.transition = 'none';
      el.style.transform = 'none';
      el.style.opacity = '1';
    });
  }

  footer.addEventListener('click', function(e) {
    e.stopPropagation();
    if (active) deactivate(); else activate();
  });

  // Click anywhere to return when active
  document.addEventListener('click', function(e) {
    if (active && e.target !== footer && !footer.contains(e.target)) {
      deactivate();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && active) deactivate();
  });

  // Rebuild tessellation on resize
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      if (!active) {
        pieces.forEach(function(el) { el.remove(); });
        pieces = [];
        createTessellation();
      }
    }, 300);
  });
})();
</script>
